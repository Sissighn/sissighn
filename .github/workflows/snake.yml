name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Sissighn
          # Helle Grüns auf dunklem Grund + pinke Schlange.
          # color_dots: leer -> wenig -> viel Contributions (hell genug für schwarzen Hintergrund)
          outputs: |
            dist/github-snake-dark.svg?color_snake=#ff6ec7&color_dots=#30363d,#1a7f37,#2ea043,#3fb950,#56d364
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
