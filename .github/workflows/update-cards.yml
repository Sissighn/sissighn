name: Update Cards
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Stats, Streak & Top-Langs bauen wir selbst - keine Fremd-Instanz noetig
      - name: Generate own cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_LOGIN: Sissighn
        run: python3 .github/scripts/generate_cards.py

      # Trophy, Activity-Graph & Repo-Pins weiterhin extern, mit Fallbacks & Cache
      - name: Fetch external cards
        run: |
          mkdir -p assets
          fetch () {
            out="$1"; shift
            for url in "$@"; do
              tmp=$(mktemp)
              if curl -sfL --retry 3 --retry-delay 5 --retry-all-errors --max-time 40 "$url" -o "$tmp" \
                 && head -c 300 "$tmp" | grep -qi "<svg" \
                 && ! grep -qi "Something went wrong" "$tmp"; then
                mv "$tmp" "assets/$out"
                echo "OK  $out  <-  $url"
                return 0
              fi
              rm -f "$tmp"
            done
            echo "SKIP $out (all endpoints unavailable, keeping old version)"
          }

          TROPHY_PARAMS="username=sissighn&theme=radical&no-frame=true&no-bg=true&column=7&margin-w=10"
          fetch "trophy.svg" \
            "https://github-profile-trophy.vercel.app/?$TROPHY_PARAMS" \
            "https://github-profile-trophy-winning.vercel.app/?$TROPHY_PARAMS" \
            "https://github-profile-trophy-liard-delta.vercel.app/?$TROPHY_PARAMS" \
            "https://github-profile-trophy-fork-two.vercel.app/?$TROPHY_PARAMS" \
            "https://github-profile-trophy-kannan.vercel.app/?$TROPHY_PARAMS"

          fetch "activity.svg" \
            "https://github-readme-activity-graph.vercel.app/graph?username=sissighn&theme=react-dark&hide_border=true&bg_color=0d1117&color=d16ba5&line=d16ba5&point=ffffff&area=true&area_color=d16ba5"

          for repo in ai-race-engineer dressup-exe vintage-typewriter PlantPulse; do
            name=$(echo "$repo" | tr '[:upper:]' '[:lower:]')
            fetch "pin-$name.svg" \
              "https://github-readme-stats.vercel.app/api/pin/?username=Sissighn&repo=$repo&theme=radical&hide_border=true&bg_color=0d1117"
          done

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git diff --staged --quiet || (git commit -m "chore: update stat cards" && git push)
