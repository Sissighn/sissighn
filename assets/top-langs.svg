    .muted { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
    .value { font: 700 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ff6ec7; }
    .big   { font: 800 34px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ffffff; }
    .mid   { font: 800 26px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ffffff; }
    .fadein { opacity: 0; animation: fade .6s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .fadein { animation: none; opacity: 1; } }
