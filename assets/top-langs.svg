<svg width="350" height="168" viewBox="0 0 350 168" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages">
  <style>
    .title { font: 600 17px 'Segoe UI', Ubuntu, Sans-Serif; fill: #d16ba5; }
